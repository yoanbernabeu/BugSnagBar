<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BugSnagBar</title>
  <style>
    :root {
      --bg-base: #0a0a0b;
      --bg-card: rgba(28, 28, 32, 0.6);
      --bg-card-hover: rgba(38, 38, 45, 0.7);
      --bg-input: rgba(20, 20, 24, 0.8);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: rgba(255, 255, 255, 0.95);
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-tertiary: rgba(255, 255, 255, 0.35);
      --accent-purple: #4945FF;
      --accent-purple-glow: rgba(73, 69, 255, 0.4);
      --accent-blue: #3B82F6;
      --accent-green: #10B981;
      --accent-orange: #F59E0B;
      --accent-orange-glow: rgba(245, 158, 11, 0.3);
      --accent-red: #EF4444;
      --accent-red-glow: rgba(239, 68, 68, 0.3);
      --gradient-purple: linear-gradient(135deg, #4945FF 0%, #6366F1 100%);
      --gradient-mesh: radial-gradient(at 0% 0%, rgba(73, 69, 255, 0.15) 0px, transparent 50%),
                       radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --radius-sm: 8px;
      --radius-md: 12px;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-base: #f5f5f7; --bg-card: rgba(255, 255, 255, 0.8);
        --bg-card-hover: rgba(250, 250, 255, 0.9); --bg-input: rgba(245, 245, 250, 0.9);
        --glass-border: rgba(0, 0, 0, 0.08); --text-primary: rgba(0, 0, 0, 0.9);
        --text-secondary: rgba(0, 0, 0, 0.55); --text-tertiary: rgba(0, 0, 0, 0.35);
        --gradient-mesh: radial-gradient(at 0% 0%, rgba(73, 69, 255, 0.08) 0px, transparent 50%),
                         radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      font-size: 13px; background: var(--bg-base); background-image: var(--gradient-mesh);
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
      overflow: hidden; user-select: none; display: flex; flex-direction: column; height: 100vh;
    }

    .header {
      padding: 16px 20px 12px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--gradient-purple);
      display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px var(--accent-purple-glow);
    }
    .header-icon svg { width: 16px; height: 16px; fill: white; }
    .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .header-actions { display: flex; gap: 8px; }
    .header-btn {
      width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--bg-card);
      border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s ease; color: var(--text-secondary);
    }
    .header-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .header-btn svg { width: 14px; height: 14px; fill: currentColor; }
    .header-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
    .header-badge.red { background: var(--accent-red); color: white; }
    .header-badge.orange { background: var(--accent-orange); color: white; }
    .header-badge.blue { background: var(--accent-blue); color: white; }

    .content { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

    /* ERROR CARD */
    .error-item {
      padding: 14px 16px; background: var(--bg-card); border: 1px solid var(--glass-border);
      border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer; transition: all 0.2s ease;
    }
    .error-item:hover { background: var(--bg-card-hover); border-color: rgba(73, 69, 255, 0.2); }
    .error-item.expanded { border-color: var(--accent-purple); cursor: default; }

    .error-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .severity-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .severity-dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red-glow); }
    .severity-dot.warning { background: var(--accent-orange); box-shadow: 0 0 8px var(--accent-orange-glow); }
    .severity-dot.info { background: var(--accent-blue); }
    .error-class { font-weight: 600; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .error-count { font-size: 11px; color: var(--text-tertiary); font-family: 'SF Mono', Monaco, monospace; }

    .error-message { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .error-item.expanded .error-message { white-space: normal; word-break: break-word; }

    .error-meta { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-tertiary); }
    .error-project { display: flex; align-items: center; gap: 4px; }
    .error-project svg { width: 12px; height: 12px; fill: currentColor; }

    /* DETAIL PANEL */
    .error-detail {
      display: none; margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--glass-border);
    }
    .error-item.expanded .error-detail { display: block; }

    .detail-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .detail-cell {
      padding: 10px 12px; background: var(--bg-input); border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
    }
    .detail-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .detail-value { font-size: 13px; font-weight: 500; }
    .detail-value.mono { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; }

    .badge {
      display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .badge-error { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
    .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--accent-orange); }
    .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
    .badge-open { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
    .badge-fixed { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
    .badge-snoozed { background: rgba(245, 158, 11, 0.15); color: var(--accent-orange); }
    .badge-ignored { background: rgba(128, 128, 128, 0.15); color: var(--text-tertiary); }
    .badge-unhandled { background: rgba(239, 68, 68, 0.25); color: var(--accent-red); }

    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

    .detail-stages { margin-bottom: 12px; }
    .detail-stages-label { font-size: 10px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stage-chip {
      display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px;
      background: var(--bg-card); border: 1px solid var(--glass-border); margin: 0 4px 4px 0;
      color: var(--text-secondary);
    }

    .detail-actions { display: flex; gap: 8px; }
    .detail-btn {
      flex: 1; padding: 10px 16px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease; border: none; text-align: center;
    }
    .detail-btn-primary {
      background: var(--gradient-purple); color: white; box-shadow: 0 2px 8px var(--accent-purple-glow);
    }
    .detail-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-purple-glow); }
    .detail-btn-secondary {
      background: var(--bg-input); color: var(--text-secondary); border: 1px solid var(--glass-border);
    }
    .detail-btn-secondary:hover { background: var(--bg-card-hover); color: var(--text-primary); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text-tertiary); }
    .empty-state-icon { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.5; }
    .empty-state-icon svg { width: 100%; height: 100%; fill: currentColor; }
    .empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
    .empty-state-text { font-size: 12px; line-height: 1.5; }

    /* FOOTER */
    .footer {
      padding: 8px 20px; border-top: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 11px; color: var(--text-tertiary); flex-shrink: 0;
    }
    .footer-status { display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); }
    .status-dot.error { background: var(--accent-red); }
    .status-dot.warning { background: var(--accent-orange); }
    .status-dot.inactive { background: var(--text-tertiary); }
    .restore-link { color: var(--accent-purple); cursor: pointer; }
    .restore-link:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      </div>
      <span class="header-title">BugSnagBar</span>
      <span class="header-badge" id="errorBadge" style="display:none">0</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      </button>
      <button class="header-btn" id="prefsBtn" title="Preferences">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </div>

  <div class="content" id="errorsList">
    <div class="empty-state">
      <div class="empty-state-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div class="empty-state-title">No errors</div>
      <div class="empty-state-text">Configure your account and projects in preferences to start monitoring.</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-status">
      <div class="status-dot inactive" id="statusDot"></div>
      <span id="lastUpdated">Not yet refreshed</span>
    </div>
    <span class="restore-link" id="restoreBtn" style="display:none">Restore hidden</span>
  </div>

  <script>
    document.getElementById('refreshBtn').addEventListener('click', async () => {
      if (window.bugsnagbar) {
        document.getElementById('lastUpdated').textContent = 'Refreshing...';
        await window.bugsnagbar.bugsnag.refresh();
      }
    });
    document.getElementById('prefsBtn').addEventListener('click', () => {
      if (window.bugsnagbar) window.bugsnagbar.app.showPreferences();
    });
    document.getElementById('restoreBtn').addEventListener('click', async () => {
      if (window.bugsnagbar) await window.bugsnagbar.bugsnag.restoreErrors();
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const seconds = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
      if (seconds < 60) return 'just now';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      return Math.floor(seconds / 86400) + 'd ago';
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }

    function formatNumber(n) {
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return n.toString();
    }

    function renderErrors(errors) {
      const container = document.getElementById('errorsList');
      const badge = document.getElementById('errorBadge');
      const restoreBtn = document.getElementById('restoreBtn');

      if (!errors || errors.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
            <div class="empty-state-title">All clear!</div>
            <div class="empty-state-text">No errors to display right now.</div>
          </div>`;
        badge.style.display = 'none';
        restoreBtn.style.display = 'none';
        return;
      }

      const criticalCount = errors.filter(e => e.severity === 'error').length;
      const warningCount = errors.filter(e => e.severity === 'warning').length;

      if (criticalCount > 0) { badge.textContent = criticalCount; badge.className = 'header-badge red'; }
      else if (warningCount > 0) { badge.textContent = warningCount; badge.className = 'header-badge orange'; }
      else { badge.textContent = errors.length; badge.className = 'header-badge blue'; }
      badge.style.display = 'inline';

      container.innerHTML = errors.map(error => `
        <div class="error-item" data-id="${escapeHtml(error.id)}">
          <div class="error-header">
            <div class="severity-dot ${error.severity}"></div>
            <div class="error-class">${escapeHtml(error.errorClass)}</div>
            <div class="error-count">${formatNumber(error.eventsCount)}x</div>
          </div>
          <div class="error-message">${escapeHtml(error.message)}</div>
          <div class="error-meta">
            <div class="error-project">
              <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
              ${escapeHtml(error.projectName)}
            </div>
            <span>${timeAgo(error.lastSeen)}</span>
            <span>${formatNumber(error.usersAffected)} users</span>
          </div>

          <div class="error-detail">
            <div class="detail-tags">
              <span class="badge badge-${error.severity}">${error.severity}</span>
              <span class="badge badge-${error.status}">${error.status}</span>
              ${error.unhandled ? '<span class="badge badge-unhandled">unhandled</span>' : ''}
              ${error.commentCount > 0 ? '<span class="badge badge-info">' + error.commentCount + ' comment' + (error.commentCount > 1 ? 's' : '') + '</span>' : ''}
            </div>

            <div class="detail-grid">
              <div class="detail-cell">
                <div class="detail-label">Events</div>
                <div class="detail-value mono">${formatNumber(error.eventsCount)}</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">Users affected</div>
                <div class="detail-value mono">${formatNumber(error.usersAffected)}</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">First seen</div>
                <div class="detail-value">${formatDate(error.firstSeen)}</div>
              </div>
              <div class="detail-cell">
                <div class="detail-label">Last seen</div>
                <div class="detail-value">${formatDate(error.lastSeen)}</div>
              </div>
            </div>

            ${error.releaseStages && error.releaseStages.length > 0 ? `
              <div class="detail-stages">
                <div class="detail-stages-label">Release stages</div>
                ${error.releaseStages.map(s => '<span class="stage-chip">' + escapeHtml(s) + '</span>').join('')}
              </div>
            ` : ''}

            <div class="detail-actions">
              <button class="detail-btn detail-btn-primary" data-url="${escapeHtml(error.url)}">Open in Bugsnag</button>
              <button class="detail-btn detail-btn-secondary" data-dismiss-id="${escapeHtml(error.id)}">Hide</button>
            </div>
          </div>
        </div>
      `).join('');

      // Click to expand/collapse
      container.querySelectorAll('.error-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (e.target.closest('.detail-btn')) return;
          item.classList.toggle('expanded');
        });
      });

      // Open in Bugsnag
      container.querySelectorAll('.detail-btn-primary').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const url = btn.dataset.url;
          if (url && window.bugsnagbar) window.bugsnagbar.app.openExternal(url);
        });
      });

      // Dismiss
      container.querySelectorAll('.detail-btn-secondary[data-dismiss-id]').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          if (window.bugsnagbar) await window.bugsnagbar.bugsnag.dismissError(btn.dataset.dismissId);
        });
      });

      restoreBtn.style.display = 'inline';
    }

    function updateStatus(data) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('lastUpdated');
      dot.className = 'status-dot';
      if (data.status === 'red') dot.classList.add('error');
      else if (data.status === 'orange') dot.classList.add('warning');
      else if (data.status === 'gray') dot.classList.add('inactive');
      text.textContent = 'Updated ' + new Date(data.lastUpdated).toLocaleTimeString();
    }

    if (window.bugsnagbar) {
      window.bugsnagbar.on.dataUpdated((data) => {
        renderErrors(data.errors);
        updateStatus(data);
      });
      window.bugsnagbar.bugsnag.refresh();
    }
  </script>
</body>
</html>
